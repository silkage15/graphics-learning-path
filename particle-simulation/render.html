<canvas id="glcanvas" width="1280" height="720"></canvas>

<script>
const canvas = document.getElementById("glcanvas");
const gl = canvas.getContext("webgl");

// 顶点着色器：全屏三角形
const vsSource = `
attribute vec2 aPos;
void main() {
    gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

// 片元着色器：加入 iMouse 控制视角
const fsSource = `
precision highp float;

uniform vec2 uResolution;
uniform vec4 iMouse;

// -------------------- 工具函数 --------------------
vec3 normalize3(vec3 p) {
    return p / length(p);
}

float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);

    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));

    vec2 u = f * f * (3.0 - 2.0 * f);

    return mix(a, b, u.x) +
           (c - a) * u.y * (1.0 - u.x) +
           (d - b) * u.x * u.y;
}

float fbm(vec2 p) {
    float v = 0.0;
    float a = 0.5;

    for(int i = 0; i < 6; i++) {
        v += a * noise(p);
        p *= 2.0;
        a *= 0.5;
    }
    return v;
}


// 地形高度
float ground(vec3 p) {
    float h = fbm(p.xz * 0.001);   // 0~1 的噪声
    h = pow(h, 3.0);               // 拉高山峰，让山更尖
    return h * 1500.0 - 1000.0;    // 放大高度并下移
}


// 法线（高度图梯度）
vec3 calcNormal(vec3 p) {
    float dx = ground(p + vec3(0.01,0.0,0.0)) - ground(p - vec3(0.01,0.0,0.0));
    float dz = ground(p + vec3(0.0,0.0,0.01)) - ground(p - vec3(0.0,0.0,0.01));
    return normalize3(vec3(-dx, 0.02, -dz));
}

// Raymarch
bool raymarch(vec3 ro, vec3 rd, out vec3 hitPos, out int hitType) {
    float f = 0.0;
    for(int i=0; i<2000; i++) {
        vec3 pos = ro + rd * f;

        if(pos.y <= -800.0) {
            hitPos = pos;
            hitType = 0;
            return true;
        }

        float y = ground(pos);
        if(pos.y <= y) {
            hitPos = pos;
            hitType = 1;
            return true;
        }

        f += max(1.0, 0.01 * f);
        if(f > 10000.0) break;
    }
    return false;
}

vec3 skyColor(vec3 rd) {
    // 天空渐变
    float t = clamp(rd.y * 0.5 + 0.5, 0.0, 1.0);
    vec3 sky = mix(vec3(0.25, 0.45, 0.85), vec3(0.6, 0.8, 1.0), t);

    // 多层云噪声（更真实）
    float n = 0.0;
    n += 0.6 * fbm(rd.xz * 1.5 + rd.y * 0.5);
    n += 0.3 * fbm(rd.xz * 3.0 + rd.y * 1.0);
    n += 0.1 * fbm(rd.xz * 6.0 + rd.y * 2.0);

    // 云密度（更柔和）
    float cloud = smoothstep(0.55, 0.75, n);

    // 云光照（更弱、更自然）
    float light = dot(rd, normalize(vec3(0.6, 1.0, 0.3))) * 0.3 + 0.7;

    // 云颜色（偏灰，不是纯白）
    vec3 cloudColor = vec3(0.9, 0.92, 0.95) * cloud * light;

    // 最终混合（降低云的权重）
    return sky * 0.8 + cloudColor * 0.5;
}



// -------------------- 主片元着色器 --------------------
void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / (uResolution.y * 0.5);

    vec3 ro = vec3(0.0, 0.0, -100.0);
    vec3 rd = normalize3(vec3(uv, 2.0));

    // -------------------- 鼠标控制视角 --------------------
    float yaw = (iMouse.x / uResolution.x - 0.5) * 3.14159;
    float pitch = (iMouse.y / uResolution.y - 0.5) * 3.14159;

    mat3 rotY = mat3(
        cos(yaw), 0.0, sin(yaw),
        0.0,      1.0, 0.0,
       -sin(yaw), 0.0, cos(yaw)
    );

    mat3 rotX = mat3(
        1.0, 0.0,        0.0,
        0.0, cos(pitch), -sin(pitch),
        0.0, sin(pitch),  cos(pitch)
    );

    rd = rotY * rotX * rd;

    // -------------------- Raymarch 渲染 --------------------
    vec3 hitPos;
    int hitType;
    vec3 col;

    if(raymarch(ro, rd, hitPos, hitType)) {
        vec3 LIGHT = normalize3(vec3(1.0,1.0,1.0));
        vec3 nor;

        if(hitType == 1) {
            nor = calcNormal(hitPos);
            col = vec3(0.7, 0.7, 0.5);
        } else {
            nor = vec3(0.0, 1.0, 0.0);
            col = vec3(0.0, 0.5, 0.7);
        }

        float lt = max(0.0, dot(nor, LIGHT));
        col *= lt;
    } else {
        col = skyColor(rd);
    }

    gl_FragColor = vec4(col, 1.0);
}
`;

// -------------------- WebGL 初始化 --------------------
function createShader(type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    return s;
}

const vs = createShader(gl.VERTEX_SHADER, vsSource);
const fs = createShader(gl.FRAGMENT_SHADER, fsSource);

const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
gl.useProgram(program);

// 全屏三角形
const quad = new Float32Array([
    -1, -1,
     3, -1,
    -1,  3
]);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(program, "aPos");
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// 分辨率传给片元着色器
const uResolution = gl.getUniformLocation(program, "uResolution");
gl.uniform2f(uResolution, canvas.width, canvas.height);

// -------------------- iMouse 传入 shader --------------------
const iMouse = gl.getUniformLocation(program, "iMouse");
let mouse = [0, 0, 0, 0];

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    mouse[0] = e.clientX - rect.left;
    mouse[1] = canvas.height - (e.clientY - rect.top);
});

// -------------------- 渲染循环 --------------------
function render() {
    gl.uniform4f(iMouse, mouse[0], mouse[1], mouse[2], mouse[3]);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
}
render();
</script>
